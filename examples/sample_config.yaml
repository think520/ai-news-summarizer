# Example configuration with multiple source types

app:
  name: "AI News Summarizer"
  version: "1.0.0"
  log_level: "DEBUG"

# Multiple news sources
sources:
  # RSS feeds
  - type: "rss"
    name: "hacker_news"
    params:
      url: "https://hnrss.org/frontpage"
      max_items: 15

  # Web scraper
  - type: "scraper"
    name: "blog_posts"
    params:
      url: "https://example.com/blog"
      title_selector: "h2.post-title"
      content_selector: "div.post-content"
      max_items: 10

  # API source (e.g., NewsAPI)
  - type: "api"
    name: "news_api"
    params:
      endpoint: "https://newsapi.org/v2/top-headlines"
      api_key: "${NEWS_API_KEY}"
      params:
        country: "us"
        category: "technology"
      max_items: 20

  # Local files
  - type: "local"
    name: "local_articles"
    params:
      file_path: "./data/articles/"
      format: "json"
      max_items: 50

# LLM settings
llm:
  default: "openai"

  providers:
    openai:
      model: "gpt-4o-mini"
      api_key: "${OPENAI_API_KEY}"
      max_tokens: 300
      temperature: 0.3

    anthropic:
      model: "claude-3-haiku-20240307"
      api_key: "${ANTHROPIC_API_KEY}"
      max_tokens: 500
      temperature: 0.3

    ollama:
      model: "llama3"
      base_url: "http://localhost:11434"
      max_tokens: 500
      temperature: 0.3

# Summary settings
summary:
  max_length: 5
  style: "concise"
  include_title: true
  language: "zh"
